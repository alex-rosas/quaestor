# Langfuse development stack — self-hosted observability for Quaestor.
#
# Usage:
#   docker-compose -f docker-compose.langfuse.yml up -d
#
# After startup (~30s):
#   1. Open http://localhost:3000
#   2. Create an account (any email — local only)
#   3. Create a project called "Quaestor"
#   4. Copy Public Key and Secret Key into .env:
#        LANGFUSE_PUBLIC_KEY=pk-lf-...
#        LANGFUSE_SECRET_KEY=sk-lf-...
#        LANGFUSE_HOST=http://localhost:3000
#
# Stop:
#   docker-compose -f docker-compose.langfuse.yml down
#   docker-compose -f docker-compose.langfuse.yml down -v  # also removes DB data

version: '3.8'

services:
  langfuse-server:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=local-dev-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=local-dev-salt-change-in-production
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped

  langfuse-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  langfuse-data:
